name: collect-meta

# GitHub's scheduled `cron` is best-effort: it DELAYS and silently DROPS
# triggers, worst of all at the congested :00/:30 marks. That is why a
# "*/30" schedule was only refreshing the dashboard ~every 90 min and stalled
# for hours at a time. So we no longer rely on cron for cadence. Instead ONE
# job self-loops for ~50 min, collecting a short budget and committing after
# every pass, so data lands ~every 9 min. The cron below is only a RESTART
# HEARTBEAT (offset off the congested marks), and concurrency single-flight
# keeps runs back to back -> effectively continuous, scheduler-proof.
#
# snapshot.json is published as a GitHub RELEASE ASSET (2GB cap), not a git
# commit: git/GitHub hard-rejects any committed blob over ~104,857,600 bytes
# (100MiB), and that file has no natural size ceiling by design (Sohum wants
# to collect as many games as the API allows, uncapped). Committing it kept
# tipping over the git limit and silently blocking ALL data for hours
# (2026-07-07 outage). The small bounded state files (seen/producers/
# elite_pool/state/stats, all capped well under any limit) still go to git as
# before, since they benefit from being versioned alongside the code.
on:
  schedule:
    - cron: "13,43 * * * *"   # heartbeat only; the job loops internally
  workflow_dispatch:
    inputs:
      iteration_budget:
        description: "Seconds to crawl per inner pass (commit cadence)"
        default: "540"
      wall_clock:
        description: "Total seconds the job keeps looping before it exits"
        default: "3000"

# Let a run finish before the next starts; never cancel a collection midway.
concurrency:
  group: collect-meta
  cancel-in-progress: false

permissions:
  contents: write            # so the job can commit data/ + publish releases

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Restore snapshot.json from the Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # snapshot.json is NOT in this checkout (published to a Release
          # asset instead, see the notes below), so a fresh runner has to
          # pull the current one back down before collecting or every run
          # would start from empty and silently discard all prior history
          # (this happened once already: 2026-07-08, caught within the hour
          # by checking the asset size after a verification run).
          mkdir -p data
          if gh release download live-snapshot -p snapshot.json.gz -O data/snapshot.json.gz --clobber 2>/dev/null; then
            gunzip -c data/snapshot.json.gz > data/snapshot.json
            echo "restored snapshot.json from the live-snapshot release asset"
          else
            echo "no existing release asset (first run); starting from empty"
          fi

      - name: Collect (self-looping, commits + publishes every pass)
        env:
          BS_PROXY_KEY: ${{ secrets.BS_PROXY_KEY }}
          ITER_BUDGET: ${{ github.event.inputs.iteration_budget || '540' }}
          WALL_CLOCK: ${{ github.event.inputs.wall_clock || '3000' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          git config user.name "bsbuddy-collector"
          git config user.email "collector@users.noreply.github.com"
          release_tag="live-snapshot"
          gh release view "$release_tag" >/dev/null 2>&1 || \
            gh release create "$release_tag" \
              --title "Live meta snapshot (auto-updated)" \
              --notes "Always-current data/snapshot.json from the collector. Not a versioned release: every pass overwrites this asset in place. The app downloads this URL directly."
          start=$(date +%s)
          pass=0
          while :; do
            pass=$((pass+1))
            echo "::group::collect pass $pass"
            BS_TIME_BUDGET="$ITER_BUDGET" python -m collector.main || echo "pass $pass crawl failed, continuing"

            # snapshot.json.gz: publish as a release asset, no size ceiling.
            # Pre-gzipped by the collector itself (see collector/main.py) since
            # release assets don't get auto-compressed on the fly the way
            # raw.githubusercontent.com did.
            if [ -f data/snapshot.json.gz ]; then
              gh release upload "$release_tag" data/snapshot.json.gz --clobber || \
                echo "::warning::release asset upload failed this pass, will retry next pass"
            fi

            # Everything else (small, bounded): commit to git as before.
            git add data/elite_pool.json data/producers.json data/seen.json data/state.json data/stats.json
            if git diff --cached --quiet; then
              echo "no small-file changes this pass"
            else
              git commit -m "collect: refresh meta state [skip ci]"
              pushed=0
              for attempt in 1 2 3 4 5; do
                if git push; then pushed=1; break; fi
                echo "push rejected; syncing then retrying (attempt $attempt)"
                git pull --rebase --strategy-option=theirs --autostash origin main || git rebase --abort || true
                sleep 4
              done
              if [ "$pushed" -ne 1 ]; then
                # These files are small and capped by count (SEEN_CAP etc.), so
                # this should not recur, but if a push still can't land, don't
                # leave it committed locally: the next pass would stack another
                # commit on top and compound whatever the problem is across the
                # rest of this job's passes (this is exactly what turned one bad
                # push into an hours-long stall on 2026-07-07).
                echo "::warning::push failed after 5 attempts; resetting to origin/main so this pass doesn't block future passes"
                git fetch origin main
                git reset --hard origin/main
              fi
            fi
            echo "::endgroup::"
            elapsed=$(( $(date +%s) - start ))
            if [ "$elapsed" -ge "$WALL_CLOCK" ]; then
              echo "wall clock ${elapsed}s >= ${WALL_CLOCK}s; ending this run (heartbeat will restart)"
              break
            fi
          done
