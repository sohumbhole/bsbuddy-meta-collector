name: collect-meta

# Runs on a schedule (accumulating state between runs) plus manual trigger.
# A PUBLIC repo gets unlimited free Actions minutes, so this can run often.
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:
    inputs:
      time_budget:
        description: "Seconds to crawl this run"
        default: "1200"

# Let a run finish before the next starts; don't cancel a collection midway.
concurrency:
  group: collect-meta
  cancel-in-progress: false

permissions:
  contents: write            # so the job can commit updated data/ back

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Collect
        env:
          BS_PROXY_KEY: ${{ secrets.BS_PROXY_KEY }}
          BS_TIME_BUDGET: ${{ github.event.inputs.time_budget || '1200' }}
        run: python -m collector.main

      - name: Commit updated data
        run: |
          git config user.name "bsbuddy-collector"
          git config user.email "collector@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "collect: refresh meta snapshot [skip ci]"
            git push
          fi
