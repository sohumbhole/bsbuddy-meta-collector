name: collect-meta

# GitHub's scheduled `cron` is best-effort: it DELAYS and silently DROPS
# triggers, worst of all at the congested :00/:30 marks. That is why a
# "*/30" schedule was only refreshing the dashboard ~every 90 min and stalled
# for hours at a time. So we no longer rely on cron for cadence. Instead ONE
# job self-loops for ~50 min, collecting a short budget and committing after
# every pass, so data lands ~every 9 min. The cron below is only a RESTART
# HEARTBEAT (offset off the congested marks), and concurrency single-flight
# keeps runs back to back -> effectively continuous, scheduler-proof.
on:
  schedule:
    - cron: "13,43 * * * *"   # heartbeat only; the job loops internally
  workflow_dispatch:
    inputs:
      iteration_budget:
        description: "Seconds to crawl per inner pass (commit cadence)"
        default: "540"
      wall_clock:
        description: "Total seconds the job keeps looping before it exits"
        default: "3000"

# Let a run finish before the next starts; never cancel a collection midway.
concurrency:
  group: collect-meta
  cancel-in-progress: false

permissions:
  contents: write            # so the job can commit updated data/ back

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Collect (self-looping, commits every pass)
        env:
          BS_PROXY_KEY: ${{ secrets.BS_PROXY_KEY }}
          ITER_BUDGET: ${{ github.event.inputs.iteration_budget || '540' }}
          WALL_CLOCK: ${{ github.event.inputs.wall_clock || '3000' }}
        run: |
          set -e
          git config user.name "bsbuddy-collector"
          git config user.email "collector@users.noreply.github.com"
          start=$(date +%s)
          pass=0
          while :; do
            pass=$((pass+1))
            echo "::group::collect pass $pass"
            BS_TIME_BUDGET="$ITER_BUDGET" python -m collector.main || echo "pass $pass crawl failed, continuing"
            # Robust publish: retry with rebase so a rare overlapping run can't
            # drop this cycle's data (the earlier hard failure was a push race).
            git add data/
            if git diff --cached --quiet; then
              echo "no data changes this pass"
            else
              git commit -m "collect: refresh meta snapshot [skip ci]"
              pushed=0
              for attempt in 1 2 3 4 5; do
                if git push; then pushed=1; break; fi
                echo "push rejected; syncing then retrying (attempt $attempt)"
                git pull --rebase --strategy-option=theirs --autostash origin main || git rebase --abort || true
                sleep 4
              done
              if [ "$pushed" -ne 1 ]; then
                # A push that can never land (e.g. a data file over GitHub's
                # 100MB limit) must NOT stay committed locally: the next pass
                # would stack another commit on top and compound the same
                # unpushable growth for the rest of the job (this is exactly
                # what stalled collection for hours on 2026-07-07). Drop this
                # pass's commit and resume clean from origin/main; the size
                # budget in collector.model prevents the file from growing
                # past the limit in the first place, so this is a safety net.
                echo "::warning::push failed after 5 attempts; resetting to origin/main so this pass's data doesn't block future passes"
                git fetch origin main
                git reset --hard origin/main
              fi
            fi
            echo "::endgroup::"
            elapsed=$(( $(date +%s) - start ))
            if [ "$elapsed" -ge "$WALL_CLOCK" ]; then
              echo "wall clock ${elapsed}s >= ${WALL_CLOCK}s; ending this run (heartbeat will restart)"
              break
            fi
          done
