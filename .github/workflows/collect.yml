name: collect-meta

# CADENCE MODEL: one job self-loops for ~5.5h, collecting a short budget and
# committing after every pass so data lands ~every 9 min, then its final step
# RE-DISPATCHES the next run (see the "Re-dispatch" step + the `on:` block).
# The chain, not GitHub's cron, is what keeps collection continuous and
# scheduler-proof. concurrency single-flight keeps overlapping runs orderly.
#
# snapshot.json is published as a GitHub RELEASE ASSET (2GB cap), not a git
# commit: git/GitHub hard-rejects any committed blob over ~104,857,600 bytes
# (100MiB), and that file has no natural size ceiling by design (Sohum wants
# to collect as many games as the API allows, uncapped). Committing it kept
# tipping over the git limit and silently blocking ALL data for hours
# (2026-07-07 outage). The small bounded state files (seen/producers/
# elite_pool/state/stats, all capped well under any limit) still go to git as
# before, since they benefit from being versioned alongside the code.
on:
  # RELIABILITY MODEL (2026-07-08, Fable Q1 - the real fix, replaces the interim
  # 5.5h-only mitigation): GitHub's scheduled cron is best-effort and silently
  # DROPS triggers under load (observed a 2.5h gap where the heartbeat never
  # fired), so we STOP depending on it for cadence. The last step of every run
  # RE-DISPATCHES the next run via workflow_dispatch using the built-in
  # GITHUB_TOKEN (a documented exception to the anti-recursion rule). That makes
  # the collector a self-perpetuating CHAIN that never waits on GitHub's
  # scheduler. The cron below is now only a BACKUP that resurrects the chain in
  # the rare case a run is hard-evicted before its re-dispatch step runs.
  # Kill switch: set repo variable COLLECTOR_ENABLED=false (Settings > Variables)
  # to stop the chain without editing code.
  schedule:
    - cron: "*/30 * * * *"   # BACKUP only now (chain is primary); resurrects the
                             # chain if a run dies before re-dispatching
  workflow_dispatch:
    inputs:
      iteration_budget:
        description: "Seconds to crawl per inner pass (commit cadence)"
        default: "540"
      wall_clock:
        description: "Total seconds the job keeps looping before it exits"
        default: "19800"     # ~5.5h; GitHub's hard job cap is 6h

# Let a run finish before the next starts; never cancel a collection midway.
# A queued heartbeat during a live 5.5h run just waits, then takes over -> the
# chain stays continuous as long as ONE cron fires per ~5.5h window.
concurrency:
  group: collect-meta
  cancel-in-progress: false

permissions:
  contents: write            # so the job can commit data/ + publish releases
  actions: write             # so the job can re-dispatch itself (self-chaining)

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350       # just under GitHub's 6h hard cap
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Restore snapshot.json from the Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # snapshot.json is NOT in this checkout (published to a Release
          # asset instead, see the notes below), so a fresh runner has to
          # pull the current one back down before collecting or every run
          # would start from empty and silently discard all prior history
          # (this happened once already: 2026-07-08, caught within the hour
          # by checking the asset size after a verification run).
          mkdir -p data
          if gh release download live-snapshot -p snapshot.json.gz -O data/snapshot.json.gz --clobber 2>/dev/null; then
            gunzip -c data/snapshot.json.gz > data/snapshot.json
            echo "restored snapshot.json from the live-snapshot release asset"
          else
            echo "no existing release asset (first run); starting from empty"
          fi

      - name: Collect (self-looping, commits + publishes every pass)
        env:
          BS_PROXY_KEY: ${{ secrets.BS_PROXY_KEY }}
          ITER_BUDGET: ${{ github.event.inputs.iteration_budget || '540' }}
          # Was mistakenly '3000' (50min): scheduled/chained runs (no dispatch
          # input) fell back to it, so the 5.5h loop only ever applied to manual
          # dispatches. Fixed to the real 5.5h default.
          WALL_CLOCK: ${{ github.event.inputs.wall_clock || '19800' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          git config user.name "bsbuddy-collector"
          git config user.email "collector@users.noreply.github.com"
          release_tag="live-snapshot"
          gh release view "$release_tag" >/dev/null 2>&1 || \
            gh release create "$release_tag" \
              --title "Live meta snapshot (auto-updated)" \
              --notes "Always-current data/snapshot.json from the collector. Not a versioned release: every pass overwrites this asset in place. The app downloads this URL directly."
          start=$(date +%s)
          pass=0
          while :; do
            pass=$((pass+1))
            echo "::group::collect pass $pass"
            BS_TIME_BUDGET="$ITER_BUDGET" python -m collector.main || echo "pass $pass crawl failed, continuing"

            # snapshot.json.gz: publish as a release asset, no size ceiling.
            # Pre-gzipped by the collector itself (see collector/main.py) since
            # release assets don't get auto-compressed on the fly the way
            # raw.githubusercontent.com did.
            if [ -f data/snapshot.json.gz ]; then
              gh release upload "$release_tag" data/snapshot.json.gz --clobber || \
                echo "::warning::release asset upload failed this pass, will retry next pass"
            fi

            # tournaments.json.gz (Q3): only rewritten ~once/day by the daily
            # gate, but re-upload whenever it exists so the release stays current.
            if [ -f data/tournaments.json.gz ]; then
              gh release upload "$release_tag" data/tournaments.json.gz --clobber || \
                echo "::warning::tournaments asset upload failed this pass, will retry next pass"
            fi

            # Everything else (small, bounded): commit to git as before.
            git add data/elite_pool.json data/producers.json data/seen.json data/state.json data/stats.json
            if git diff --cached --quiet; then
              echo "no small-file changes this pass"
            else
              git commit -m "collect: refresh meta state [skip ci]"
              pushed=0
              for attempt in 1 2 3 4 5; do
                if git push; then pushed=1; break; fi
                echo "push rejected; syncing then retrying (attempt $attempt)"
                git pull --rebase --strategy-option=theirs --autostash origin main || git rebase --abort || true
                sleep 4
              done
              if [ "$pushed" -ne 1 ]; then
                # These files are small and capped by count (SEEN_CAP etc.), so
                # this should not recur, but if a push still can't land, don't
                # leave it committed locally: the next pass would stack another
                # commit on top and compound whatever the problem is across the
                # rest of this job's passes (this is exactly what turned one bad
                # push into an hours-long stall on 2026-07-07).
                echo "::warning::push failed after 5 attempts; resetting to origin/main so this pass doesn't block future passes"
                git fetch origin main
                git reset --hard origin/main
              fi
            fi
            echo "::endgroup::"
            elapsed=$(( $(date +%s) - start ))
            if [ "$elapsed" -ge "$WALL_CLOCK" ]; then
              echo "wall clock ${elapsed}s >= ${WALL_CLOCK}s; ending this run (successor was/will be dispatched)"
              break
            fi
          done

      - name: Re-dispatch the next run (self-chaining)
        # if: always() so it fires on success, crawl failure, AND cancellation.
        # Gated on COLLECTOR_ENABLED so Sohum can stop the chain from repo
        # Settings > Variables without editing code (unset/anything-but-'false'
        # keeps it running). This is what makes collection scheduler-proof: the
        # chain never waits on GitHub's unreliable cron. `sleep` is a runaway
        # floor - if some fast-exit bug ever made runs end in seconds, this caps
        # the chain to ~1/min instead of a fork bomb. Normal runs take ~5.5h so
        # it is negligible. The */30 cron is the backup if this step itself is
        # skipped (hard runner eviction).
        if: always() && vars.COLLECTOR_ENABLED != 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 30
          echo "self-chaining: dispatching successor run of collect.yml"
          gh workflow run collect.yml --ref main \
            || echo "::warning::self-dispatch failed; the */30 cron backup will restart the chain"
